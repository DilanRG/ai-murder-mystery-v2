name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ai-murder-mystery-windows
            exe_src: ai-murder-mystery.exe
            exe_dst: ai-murder-mystery-windows.exe
          - os: ubuntu-latest
            artifact: ai-murder-mystery-linux
            exe_src: ai-murder-mystery
            exe_dst: ai-murder-mystery-linux
          - os: macos-latest
            artifact: ai-murder-mystery-macos
            exe_src: ai-murder-mystery
            exe_dst: ai-murder-mystery-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install --require-hashes -r backend/requirements-build.lock

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test frontend boundary contracts
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend

      - name: Package with PyInstaller
        run: python build/build.py --skip-frontend

      - name: Rename executable for platform
        shell: bash
        run: mv dist/${{ matrix.exe_src }} dist/${{ matrix.exe_dst }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe_dst }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/ai-murder-mystery-windows/ai-murder-mystery-windows.exe
            artifacts/ai-murder-mystery-linux/ai-murder-mystery-linux
            artifacts/ai-murder-mystery-macos/ai-murder-mystery-macos
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
