name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ai-murder-mystery-windows
            exe: ai-murder-mystery.exe
          - os: ubuntu-latest
            artifact: ai-murder-mystery-linux
            exe: ai-murder-mystery
          - os: macos-latest
            artifact: ai-murder-mystery-macos
            exe: ai-murder-mystery

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend

      - name: Package with PyInstaller
        run: python build/build.py --skip-frontend

      - name: Verify executable exists
        run: |
          ls -la dist/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ai-murder-mystery-windows/ai-murder-mystery.exe
            artifacts/ai-murder-mystery-linux/ai-murder-mystery
            artifacts/ai-murder-mystery-macos/ai-murder-mystery
          generate_release_notes: true
          draft: false
          prerelease: false
