name: Verify packaged game

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/verify-packages.yml'
      - 'backend/**'
      - 'build/**'
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: package-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaged-smoke:
    name: ${{ matrix.os }} packaged smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install hash-locked Python build dependencies
        run: python -m pip install --require-hashes -r backend/requirements-build.lock

      - name: Install hash-locked frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build and smoke-test distributable
        run: python build/build.py --skip-frontend
